name: weldscan
description: WeldScan 3D — Photo-to-Blueprint app for welders and fabricators.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  sensors_plus: ^4.0.2
  http: ^1.2.1
  flutter_stripe: ^10.1.1
  pay: ^2.0.0
  image_picker: ^1.0.7
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  provider: ^6.1.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
