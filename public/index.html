<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HaulMatch – Trucker Load Platform</title>
  <style>
    :root {
      --brand: #e67e22;
      --dark:  #1a1a2e;
      --card:  #16213e;
      --text:  #eaeaea;
      --muted: #888;
      --green: #27ae60;
      --red:   #e74c3c;
      --blue:  #2980b9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
    header { background: var(--card); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--brand); }
    header h1 { color: var(--brand); font-size: 1.6rem; letter-spacing: 1px; }
    #user-info { font-size: 0.9rem; color: var(--muted); }
    #user-info span { color: var(--text); font-weight: bold; }
    #logout-btn { margin-left: 1rem; padding: 0.3rem 0.8rem; background: var(--red); border: none; color: #fff; border-radius: 4px; cursor: pointer; }

    nav { background: var(--card); display: flex; gap: 0; border-bottom: 1px solid #2a2a4a; }
    nav button { padding: 0.75rem 1.4rem; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.95rem; border-bottom: 3px solid transparent; transition: .2s; }
    nav button:hover, nav button.active { color: var(--brand); border-bottom-color: var(--brand); }

    main { padding: 2rem; max-width: 1000px; margin: 0 auto; }
    .section { display: none; }
    .section.active { display: block; }

    h2 { margin-bottom: 1.2rem; font-size: 1.3rem; color: var(--brand); }
    h3 { margin-bottom: 0.8rem; font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .form-grid.single { grid-template-columns: 1fr; }
    label { display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.85rem; color: var(--muted); }
    input, select, textarea {
      padding: 0.55rem 0.8rem; background: #0f0f23; border: 1px solid #2a2a4a;
      color: var(--text); border-radius: 4px; font-size: 0.95rem;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--brand); }
    textarea { resize: vertical; min-height: 80px; }
    .full-width { grid-column: 1 / -1; }
    button.primary { margin-top: 1rem; padding: 0.65rem 1.6rem; background: var(--brand); border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; }
    button.primary:hover { opacity: 0.88; }
    button.sm { padding: 0.35rem 0.9rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.82rem; font-weight: bold; color: #fff; }
    button.sm.green  { background: var(--green); }
    button.sm.red    { background: var(--red); }
    button.sm.blue   { background: var(--blue); }

    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .card { background: var(--card); border: 1px solid #2a2a4a; border-radius: 8px; padding: 1rem; }
    .card h4 { color: var(--brand); margin-bottom: 0.5rem; }
    .card p  { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
    .card p strong { color: var(--text); }
    .card .actions { margin-top: 0.8rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
    .badge.open      { background: #1a4a2a; color: var(--green); }
    .badge.booked    { background: #1a2a4a; color: var(--blue); }
    .badge.completed { background: #2a1a3a; color: #9b59b6; }
    .badge.cancelled { background: #3a1a1a; color: var(--red); }
    .badge.pending   { background: #3a2a1a; color: var(--brand); }
    .badge.accepted  { background: #1a3a2a; color: var(--green); }
    .badge.active    { background: #1a4a2a; color: var(--green); }
    .badge.deadmiles { background: #1a1a3a; color: #74b9ff; }
    .badge.partial   { background: #1a3a1a; color: #55efc4; }

    .fee-note { background: #1a2a1a; border: 1px solid var(--green); border-radius: 6px; padding: 0.8rem 1rem; margin-top: 0.8rem; font-size: 0.85rem; color: var(--green); }

    .error-msg { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; }
    .success-msg { color: var(--green); font-size: 0.85rem; margin-top: 0.5rem; }

    #auth-section { max-width: 420px; margin: 4rem auto; background: var(--card); padding: 2rem; border-radius: 10px; border: 1px solid #2a2a4a; }
    #auth-section h2 { text-align: center; margin-bottom: 1.5rem; }
    #auth-toggle { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--muted); }
    #auth-toggle a { color: var(--brand); cursor: pointer; text-decoration: underline; }

    .stats-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .stat { background: var(--card); border: 1px solid #2a2a4a; border-radius: 8px; padding: 0.8rem 1.2rem; flex: 1; min-width: 130px; text-align: center; }
    .stat .val { font-size: 1.6rem; font-weight: bold; color: var(--brand); }
    .stat .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-section">
  <h2>🚛 HaulMatch</h2>
  <div id="auth-form">
    <div class="form-grid single">
      <label>Email<input id="a-email" type="email" placeholder="you@example.com" /></label>
      <label>Password<input id="a-pass"  type="password" placeholder="••••••••" /></label>
      <div id="register-fields" style="display:none">
        <div class="form-grid" style="margin-top:.5rem">
          <label>Full Name<input id="a-name" placeholder="John Smith" /></label>
          <label>Role
            <select id="a-role">
              <option value="trucker">Trucker</option>
              <option value="shipper">Shipper</option>
            </select>
          </label>
          <label>Phone<input id="a-phone" placeholder="(555) 000-0000" /></label>
          <label>Company<input id="a-company" placeholder="Optional" /></label>
        </div>
      </div>
    </div>
    <button class="primary" id="auth-submit-btn" onclick="submitAuth()">Login</button>
    <div class="error-msg" id="auth-error"></div>
  </div>
  <div id="auth-toggle">
    No account? <a onclick="toggleAuthMode()">Register</a>
  </div>
</div>

<!-- APP SHELL (hidden until logged in) -->
<div id="app" style="display:none">
  <header>
    <h1>🚛 HaulMatch</h1>
    <div id="user-info">Logged in as <span id="user-name-display"></span> (<span id="user-role-display"></span>)
      <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <nav id="main-nav"></nav>

  <main>
    <!-- DASHBOARD -->
    <div class="section active" id="sec-dashboard">
      <h2>Dashboard</h2>
      <div class="stats-bar" id="stats-bar"></div>
      <div id="dashboard-content"></div>
    </div>

    <!-- LOADS -->
    <div class="section" id="sec-loads">
      <h2>Open Loads</h2>
      <div id="loads-list" class="cards"></div>
    </div>

    <!-- POST LOAD (shippers only) -->
    <div class="section" id="sec-post-load">
      <h2>Post a Load</h2>
      <div class="form-grid">
        <label>Origin City / State<input id="pl-origin" placeholder="Chicago, IL" /></label>
        <label>Destination<input id="pl-dest" placeholder="Dallas, TX" /></label>
        <label>Freight Type<input id="pl-ftype" placeholder="Palletized, Dry Van, etc." /></label>
        <label>Weight (lbs)<input id="pl-weight" type="number" placeholder="5000" /></label>
        <label>Length (ft)<input id="pl-length" type="number" placeholder="Optional" /></label>
        <label>Pay ($)<input id="pl-pay" type="number" placeholder="1200" /></label>
        <label class="full-width">Notes<textarea id="pl-notes" placeholder="Any special instructions…"></textarea></label>
      </div>
      <button class="primary" onclick="postLoad()">Post Load</button>
      <div class="error-msg"   id="pl-error"></div>
      <div class="success-msg" id="pl-success"></div>
    </div>

    <!-- ROUTES -->
    <div class="section" id="sec-routes">
      <h2>Active Trucker Routes</h2>
      <div id="routes-list" class="cards"></div>
    </div>

    <!-- POST ROUTE (truckers only) -->
    <div class="section" id="sec-post-route">
      <h2>Post My Route / Availability</h2>
      <div class="form-grid">
        <label>Origin<input id="pr-origin" placeholder="Memphis, TN" /></label>
        <label>Destination<input id="pr-dest" placeholder="Atlanta, GA" /></label>
        <label>Departure Date<input id="pr-date" type="date" /></label>
        <label>Route Type
          <select id="pr-type">
            <option value="deadmiles">Dead Miles (empty truck)</option>
            <option value="partial">Partial Space (extra room)</option>
          </select>
        </label>
        <label>Available Weight (lbs)<input id="pr-weight" type="number" placeholder="20000" /></label>
        <label>Available Length (ft)<input id="pr-length" type="number" placeholder="Optional" /></label>
        <label class="full-width">Notes<textarea id="pr-notes" placeholder="Any details…"></textarea></label>
      </div>
      <button class="primary" onclick="postRoute()">Post Route</button>
      <div class="error-msg"   id="pr-error"></div>
      <div class="success-msg" id="pr-success"></div>
    </div>

    <!-- MY BOOKINGS -->
    <div class="section" id="sec-bookings">
      <h2>My Bookings</h2>
      <div class="fee-note">💰 Platform fee: <strong>9%</strong> is applied upon every completed load. Your payout is shown on each booking.</div>
      <div id="bookings-list" class="cards" style="margin-top:1rem"></div>
    </div>
  </main>
</div>

<script>
const API = '';
let token = localStorage.getItem('hm_token');
let me    = JSON.parse(localStorage.getItem('hm_user') || 'null');

// ─── AUTH ────────────────────────────────────────────────────────────────────
let authMode = 'login';
function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('register-fields').style.display = authMode === 'register' ? 'block' : 'none';
  document.getElementById('auth-submit-btn').textContent = authMode === 'register' ? 'Register' : 'Login';
  document.querySelector('#auth-toggle a').textContent = authMode === 'register' ? 'Already have an account? Login' : 'Register';
  document.getElementById('auth-error').textContent = '';
}
async function submitAuth() {
  const email    = document.getElementById('a-email').value.trim();
  const password = document.getElementById('a-pass').value;
  document.getElementById('auth-error').textContent = '';
  try {
    let body, url;
    if (authMode === 'login') {
      url  = `${API}/api/auth/login`;
      body = { email, password };
    } else {
      url  = `${API}/api/auth/register`;
      body = {
        email, password,
        name:    document.getElementById('a-name').value.trim(),
        role:    document.getElementById('a-role').value,
        phone:   document.getElementById('a-phone').value.trim() || undefined,
        company: document.getElementById('a-company').value.trim() || undefined,
      };
    }
    const res  = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Auth failed');
    token = data.token; me = data.user;
    localStorage.setItem('hm_token', token);
    localStorage.setItem('hm_user',  JSON.stringify(me));
    showApp();
  } catch (e) { document.getElementById('auth-error').textContent = e.message; }
}
function logout() {
  token = null; me = null;
  localStorage.removeItem('hm_token'); localStorage.removeItem('hm_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-section').style.display = '';
}

// ─── APP SHELL ───────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('app').style.display = '';
  document.getElementById('user-name-display').textContent = me.name;
  document.getElementById('user-role-display').textContent = me.role;
  buildNav();
  showSection('dashboard');
  loadDashboard();
}

function buildNav() {
  const nav  = document.getElementById('main-nav');
  nav.innerHTML = '';
  const tabs = [
    { id: 'dashboard', label: '📊 Dashboard' },
    { id: 'loads',     label: '📦 Browse Loads' },
    ...(me.role === 'shipper' ? [{ id: 'post-load', label: '➕ Post Load' }] : []),
    { id: 'routes',    label: '🗺 Browse Routes' },
    ...(me.role === 'trucker' ? [{ id: 'post-route', label: '➕ Post Route' }] : []),
    { id: 'bookings',  label: '📋 My Bookings' },
  ];
  tabs.forEach(t => {
    const btn = document.createElement('button');
    btn.textContent = t.label;
    btn.dataset.sec = t.id;
    btn.onclick = () => { showSection(t.id); if (t.id === 'loads') loadLoads(); if (t.id === 'routes') loadRoutes(); if (t.id === 'bookings') loadBookings(); };
    nav.appendChild(btn);
  });
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.sec === id));
  document.getElementById(`sec-${id}`).classList.add('active');
}

// ─── API HELPER ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(`${API}${path}`, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
async function loadDashboard() {
  try {
    const [loads, routes, bookings] = await Promise.all([
      api('GET', '/api/loads'),
      api('GET', '/api/routes'),
      api('GET', '/api/bookings/my'),
    ]);
    const bar  = document.getElementById('stats-bar');
    const cont = document.getElementById('dashboard-content');
    bar.innerHTML = `
      <div class="stat"><div class="val">${loads.length}</div><div class="lbl">Open Loads</div></div>
      <div class="stat"><div class="val">${routes.length}</div><div class="lbl">Active Routes</div></div>
      <div class="stat"><div class="val">${bookings.length}</div><div class="lbl">My Bookings</div></div>
      <div class="stat"><div class="val">${bookings.filter(b => b.status === 'completed').length}</div><div class="lbl">Completed</div></div>
    `;
    const recent = bookings.slice(0, 3);
    cont.innerHTML = recent.length ? `<h3>Recent Bookings</h3><div class="cards">${recent.map(bookingCard).join('')}</div>` : '<p style="color:var(--muted)">No bookings yet. Browse loads or routes to get started.</p>';
  } catch (e) { console.error(e); }
}

// ─── LOADS ────────────────────────────────────────────────────────────────────
async function loadLoads() {
  try {
    const loads = await api('GET', '/api/loads');
    document.getElementById('loads-list').innerHTML = loads.length
      ? loads.map(loadCard).join('')
      : '<p style="color:var(--muted)">No open loads right now.</p>';
  } catch (e) { console.error(e); }
}
function loadCard(l) {
  const matchBtn = me.role === 'trucker'
    ? `<button class="sm blue" onclick="findMatches('load',${l.id})">Find Matching Routes</button>` : '';
  return `<div class="card">
    <h4>${l.origin} → ${l.destination}</h4>
    <p><strong>Freight:</strong> ${l.freight_type}</p>
    <p><strong>Weight:</strong> ${l.weight_lbs.toLocaleString()} lbs${l.length_ft ? ' | ' + l.length_ft + ' ft' : ''}</p>
    <p><strong>Pay:</strong> $${l.pay_usd.toLocaleString('en-US', {minimumFractionDigits:2})}</p>
    ${l.notes ? `<p><strong>Notes:</strong> ${l.notes}</p>` : ''}
    <p><strong>Shipper:</strong> ${l.shipper_name}</p>
    <span class="badge ${l.status}">${l.status}</span>
    <div class="actions">${matchBtn}</div>
  </div>`;
}
async function postLoad() {
  document.getElementById('pl-error').textContent = '';
  document.getElementById('pl-success').textContent = '';
  try {
    await api('POST', '/api/loads', {
      origin:       document.getElementById('pl-origin').value.trim(),
      destination:  document.getElementById('pl-dest').value.trim(),
      freight_type: document.getElementById('pl-ftype').value.trim(),
      weight_lbs:   Number(document.getElementById('pl-weight').value),
      length_ft:    Number(document.getElementById('pl-length').value) || undefined,
      pay_usd:      Number(document.getElementById('pl-pay').value),
      notes:        document.getElementById('pl-notes').value.trim() || undefined,
    });
    document.getElementById('pl-success').textContent = '✅ Load posted successfully!';
    ['pl-origin','pl-dest','pl-ftype','pl-weight','pl-length','pl-pay','pl-notes'].forEach(id => document.getElementById(id).value = '');
  } catch (e) { document.getElementById('pl-error').textContent = e.message; }
}

// ─── ROUTES ───────────────────────────────────────────────────────────────────
async function loadRoutes() {
  try {
    const routes = await api('GET', '/api/routes');
    document.getElementById('routes-list').innerHTML = routes.length
      ? routes.map(routeCard).join('')
      : '<p style="color:var(--muted)">No active routes posted.</p>';
  } catch (e) { console.error(e); }
}
function routeCard(r) {
  const matchBtn = me.role === 'shipper'
    ? `<button class="sm blue" onclick="findMatches('route',${r.id})">Find Matching Loads</button>` : '';
  const bookBtn = me.role === 'trucker' && r.trucker_id === me.id
    ? '' : (me.role === 'trucker' ? '' : '');
  return `<div class="card">
    <h4>${r.origin} → ${r.destination}</h4>
    <span class="badge ${r.route_type}">${r.route_type === 'deadmiles' ? 'Dead Miles' : 'Partial Space'}</span>
    <p style="margin-top:.4rem"><strong>Departure:</strong> ${r.departure_date}</p>
    <p><strong>Capacity:</strong> ${r.avail_weight_lbs.toLocaleString()} lbs${r.avail_length_ft ? ' | ' + r.avail_length_ft + ' ft' : ''}</p>
    ${r.notes ? `<p><strong>Notes:</strong> ${r.notes}</p>` : ''}
    <p><strong>Trucker:</strong> ${r.trucker_name}</p>
    <div class="actions">${matchBtn}${bookBtn}</div>
  </div>`;
}
async function postRoute() {
  document.getElementById('pr-error').textContent = '';
  document.getElementById('pr-success').textContent = '';
  try {
    await api('POST', '/api/routes', {
      origin:          document.getElementById('pr-origin').value.trim(),
      destination:     document.getElementById('pr-dest').value.trim(),
      departure_date:  document.getElementById('pr-date').value,
      route_type:      document.getElementById('pr-type').value,
      avail_weight_lbs: Number(document.getElementById('pr-weight').value),
      avail_length_ft:  Number(document.getElementById('pr-length').value) || undefined,
      notes:           document.getElementById('pr-notes').value.trim() || undefined,
    });
    document.getElementById('pr-success').textContent = '✅ Route posted successfully!';
    ['pr-origin','pr-dest','pr-date','pr-weight','pr-length','pr-notes'].forEach(id => document.getElementById(id).value = '');
  } catch (e) { document.getElementById('pr-error').textContent = e.message; }
}

// ─── MATCHES ─────────────────────────────────────────────────────────────────
async function findMatches(type, id) {
  try {
    const data = await api('GET', `/api/matches?${type}_id=${id}`);
    const items = type === 'load' ? data.matching_routes : data.matching_loads;
    if (!items.length) return alert('No matches found for this ' + type);
    const label = type === 'load' ? 'Matching Routes' : 'Matching Loads';
    const html  = items.map(i => type === 'load' ? routeCard(i) : loadCard(i)).join('');
    alert(`${items.length} ${label} found — check the console for details`);
    console.table(items);
  } catch (e) { alert(e.message); }
}

// ─── BOOKINGS ─────────────────────────────────────────────────────────────────
async function loadBookings() {
  try {
    const bookings = await api('GET', '/api/bookings/my');
    document.getElementById('bookings-list').innerHTML = bookings.length
      ? bookings.map(bookingCard).join('')
      : '<p style="color:var(--muted)">No bookings yet.</p>';
  } catch (e) { console.error(e); }
}
function bookingCard(b) {
  let actions = '';
  if (me.role === 'shipper' && b.status === 'pending') {
    actions = `<button class="sm green" onclick="updateBooking(${b.id},'accepted')">Accept</button>
               <button class="sm red"   onclick="updateBooking(${b.id},'cancelled')">Decline</button>`;
  }
  if (me.role === 'trucker' && b.status === 'accepted') {
    actions = `<button class="sm green" onclick="updateBooking(${b.id},'completed')">Mark Completed</button>
               <button class="sm red"   onclick="updateBooking(${b.id},'cancelled')">Cancel</button>`;
  }
  const feeInfo = b.status === 'completed'
    ? `<p style="color:var(--green)"><strong>Platform Fee (9%):</strong> $${b.platform_fee_usd.toFixed(2)} | <strong>Trucker Payout:</strong> $${b.trucker_payout_usd.toFixed(2)}</p>`
    : `<p><strong>Est. Payout:</strong> $${b.trucker_payout_usd.toFixed(2)} <span style="color:var(--muted)">(after 9% fee)</span></p>`;
  return `<div class="card">
    <h4>${b.origin} → ${b.destination}</h4>
    <span class="badge ${b.status}">${b.status}</span>
    <p style="margin-top:.4rem"><strong>Freight:</strong> ${b.freight_type}</p>
    <p><strong>Pay:</strong> $${b.pay_usd.toFixed(2)}</p>
    ${feeInfo}
    <p><strong>Trucker:</strong> ${b.trucker_name} | <strong>Shipper:</strong> ${b.shipper_name}</p>
    <div class="actions">${actions}</div>
  </div>`;
}
async function updateBooking(id, status) {
  try {
    await api('PUT', `/api/bookings/${id}`, { status });
    loadBookings();
    loadDashboard();
  } catch (e) { alert(e.message); }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if (token && me) showApp();
</script>
</body>
</html>
