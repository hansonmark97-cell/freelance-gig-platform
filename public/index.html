<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreelanceHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #1a202c; min-height: 100vh; }

    /* Nav */
    nav { background: #2d3748; color: #fff; display: flex; align-items: center; padding: 0 1.5rem; height: 56px; gap: 1rem; }
    nav .brand { font-weight: 700; font-size: 1.2rem; flex: 1; }
    nav button { background: transparent; border: 1px solid rgba(255,255,255,0.4); color: #fff; padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    nav button:hover { background: rgba(255,255,255,0.1); }
    #userInfo { font-size: 0.85rem; color: #a0aec0; }

    /* Main layout */
    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }

    /* Cards */
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #2d3748; }

    /* Tabs */
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tabs button { padding: 0.45rem 1rem; border-radius: 20px; border: 2px solid #4a90d9; background: #fff; color: #4a90d9; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .tabs button.active { background: #4a90d9; color: #fff; }

    /* Forms */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #4a5568; margin-bottom: 0.3rem; }
    input, select, textarea { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 0.9rem; }
    textarea { resize: vertical; min-height: 80px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #4a90d9; }

    /* Buttons */
    .btn { display: inline-block; padding: 0.5rem 1.2rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-primary:hover { background: #357abd; }
    .btn-secondary { background: #e2e8f0; color: #2d3748; }
    .btn-secondary:hover { background: #cbd5e0; }
    .btn-danger { background: #e53e3e; color: #fff; }
    .btn-danger:hover { background: #c53030; }
    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.8rem; }

    /* Grid of listing cards */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .list-card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 1rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .list-card h3 { font-size: 0.95rem; color: #2d3748; }
    .list-card .meta { font-size: 0.78rem; color: #718096; }
    .list-card .price { font-weight: 700; color: #38a169; }
    .list-card .actions { margin-top: 0.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
    .badge-green { background: #c6f6d5; color: #276749; }
    .badge-blue { background: #bee3f8; color: #2b6cb0; }
    .badge-yellow { background: #fefcbf; color: #744210; }

    /* Alert */
    .alert { padding: 0.7rem 1rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1rem; }
    .alert-error { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
    .alert-success { background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; }

    /* Auth panel */
    #authPanel { display: flex; justify-content: center; padding: 3rem 1rem; }
    #authPanel .card { width: 100%; max-width: 420px; }
    #authPanel .toggle { text-align: center; margin-top: 1rem; font-size: 0.85rem; }
    #authPanel .toggle a { color: #4a90d9; cursor: pointer; text-decoration: underline; }

    .hidden { display: none !important; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #fff; border-radius: 8px; padding: 1.5rem; width: 100%; max-width: 440px; position: relative; }
    .modal h2 { margin-bottom: 1rem; font-size: 1rem; }
    .modal-close { position: absolute; top: 0.75rem; right: 1rem; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #718096; }
  </style>
</head>
<body>

<nav>
  <span class="brand">🚀 FreelanceHub</span>
  <span id="userInfo"></span>
  <button id="logoutBtn" class="hidden" onclick="logout()">Logout</button>
</nav>

<!-- Auth Panel -->
<div id="authPanel">
  <div class="card">
    <div id="authMsg"></div>
    <!-- Login form -->
    <div id="loginForm">
      <h2>Sign In</h2>
      <div class="form-group"><label>Email</label><input id="loginEmail" type="email" placeholder="you@example.com" /></div>
      <div class="form-group"><label>Password</label><input id="loginPassword" type="password" placeholder="••••••••" /></div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign In</button>
      <div class="toggle">Don't have an account? <a onclick="showRegister()">Register</a></div>
    </div>
    <!-- Register form -->
    <div id="registerForm" class="hidden">
      <h2>Create Account</h2>
      <div class="form-group"><label>Full Name</label><input id="regName" type="text" placeholder="Jane Doe" /></div>
      <div class="form-group"><label>Email</label><input id="regEmail" type="email" placeholder="you@example.com" /></div>
      <div class="form-group"><label>Password</label><input id="regPassword" type="password" placeholder="At least 6 characters" /></div>
      <div class="form-group">
        <label>I am a…</label>
        <select id="regRole">
          <option value="freelancer">Freelancer – I offer services</option>
          <option value="client">Client – I need services</option>
        </select>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doRegister()">Create Account</button>
      <div class="toggle">Already have an account? <a onclick="showLogin()">Sign In</a></div>
    </div>
  </div>
</div>

<!-- App Panel (shown after login) -->
<main id="appPanel" class="hidden">
  <div id="appMsg"></div>

  <div class="tabs" id="mainTabs"></div>

  <!-- Browse Gigs -->
  <div id="tabGigs" class="hidden">
    <div class="card">
      <h2>Browse Gigs</h2>
      <div class="two-col" style="margin-bottom:1rem;">
        <div class="form-group" style="margin-bottom:0"><label>Category</label>
          <select id="gigFilterCat" onchange="loadGigs()">
            <option value="">All categories</option>
            <option>Design</option><option>Development</option><option>Writing</option>
            <option>Marketing</option><option>Video</option><option>Other</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0"><label>Max Price ($)</label>
          <input id="gigFilterMax" type="number" placeholder="any" onchange="loadGigs()" />
        </div>
      </div>
      <div id="gigList" class="grid"></div>
    </div>
  </div>

  <!-- Browse Jobs -->
  <div id="tabJobs" class="hidden">
    <div class="card">
      <h2>Browse Jobs</h2>
      <div class="form-group" style="max-width:240px;margin-bottom:1rem;"><label>Category</label>
        <select id="jobFilterCat" onchange="loadJobs()">
          <option value="">All categories</option>
          <option>Design</option><option>Development</option><option>Writing</option>
          <option>Marketing</option><option>Video</option><option>Other</option>
        </select>
      </div>
      <div id="jobList" class="grid"></div>
    </div>
  </div>

  <!-- Post Gig (freelancer) -->
  <div id="tabPostGig" class="hidden">
    <div class="card" style="max-width:520px">
      <h2>Post a New Gig</h2>
      <div class="form-group"><label>Title</label><input id="gigTitle" placeholder="e.g. I will design your logo" /></div>
      <div class="form-group"><label>Description</label><textarea id="gigDesc" placeholder="Describe what you offer…"></textarea></div>
      <div class="two-col">
        <div class="form-group"><label>Category</label>
          <select id="gigCat">
            <option>Design</option><option>Development</option><option>Writing</option>
            <option>Marketing</option><option>Video</option><option>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Price (USD)</label><input id="gigPrice" type="number" min="1" placeholder="50" /></div>
      </div>
      <div class="form-group"><label>Delivery (days)</label><input id="gigDays" type="number" min="1" placeholder="3" /></div>
      <button class="btn btn-primary" onclick="createGig()">Post Gig</button>
    </div>
  </div>

  <!-- Post Job (client) -->
  <div id="tabPostJob" class="hidden">
    <div class="card" style="max-width:520px">
      <h2>Post a New Job</h2>
      <div class="form-group"><label>Title</label><input id="jobTitle" placeholder="e.g. Build me a landing page" /></div>
      <div class="form-group"><label>Description</label><textarea id="jobDesc" placeholder="Describe what you need…"></textarea></div>
      <div class="two-col">
        <div class="form-group"><label>Category</label>
          <select id="jobCat">
            <option>Design</option><option>Development</option><option>Writing</option>
            <option>Marketing</option><option>Video</option><option>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Budget (USD)</label><input id="jobBudget" type="number" min="1" placeholder="200" /></div>
      </div>
      <button class="btn btn-primary" onclick="createJob()">Post Job</button>
    </div>
  </div>

  <!-- My Bids (freelancer) -->
  <div id="tabMyBids" class="hidden">
    <div class="card">
      <h2>My Bids</h2>
      <div id="myBidList" class="grid"></div>
    </div>
  </div>

  <!-- My Profile -->
  <div id="tabProfile" class="hidden">
    <div class="card" style="max-width:480px">
      <h2>My Profile</h2>
      <div id="profileInfo"></div>
    </div>
  </div>
</main>

<!-- Bid Modal -->
<div id="bidModal" class="modal-overlay hidden">
  <div class="modal">
    <button class="modal-close" onclick="closeBidModal()">✕</button>
    <h2>Place a Bid</h2>
    <div id="bidModalMsg"></div>
    <div class="form-group"><label>Job</label><input id="bidJobTitle" readonly /></div>
    <div class="form-group"><label>Amount (USD)</label><input id="bidAmount" type="number" min="1" placeholder="100" /></div>
    <div class="form-group"><label>Message</label><textarea id="bidMessage" placeholder="Describe your proposal…"></textarea></div>
    <button class="btn btn-primary" onclick="submitBid()">Submit Bid</button>
  </div>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('token');
let currentUser = JSON.parse(localStorage.getItem('user') || 'null');
let bidTargetJobId = null;

/* ── Auth ───────────────────────────────────────────── */
function showLogin() {
  document.getElementById('loginForm').classList.remove('hidden');
  document.getElementById('registerForm').classList.add('hidden');
  clearMsg('authMsg');
}
function showRegister() {
  document.getElementById('registerForm').classList.remove('hidden');
  document.getElementById('loginForm').classList.add('hidden');
  clearMsg('authMsg');
}

async function doLogin() {
  const email = v('loginEmail'), password = v('loginPassword');
  const res = await api('POST', '/users/login', { email, password });
  if (res.error) return showMsg('authMsg', res.error, true);
  saveSession(res.token, res.user);
  initApp();
}

async function doRegister() {
  const name = v('regName'), email = v('regEmail'), password = v('regPassword'), role = v('regRole');
  const res = await api('POST', '/users/register', { name, email, password, role });
  if (res.error) return showMsg('authMsg', res.error, true);
  saveSession(res.token, res.user);
  initApp();
}

function saveSession(t, u) {
  token = t; currentUser = u;
  localStorage.setItem('token', t);
  localStorage.setItem('user', JSON.stringify(u));
}

function logout() {
  token = null; currentUser = null;
  localStorage.removeItem('token'); localStorage.removeItem('user');
  document.getElementById('appPanel').classList.add('hidden');
  document.getElementById('authPanel').classList.remove('hidden');
  document.getElementById('logoutBtn').classList.add('hidden');
  document.getElementById('userInfo').textContent = '';
}

/* ── App bootstrap ──────────────────────────────────── */
function initApp() {
  document.getElementById('authPanel').classList.add('hidden');
  document.getElementById('appPanel').classList.remove('hidden');
  document.getElementById('logoutBtn').classList.remove('hidden');
  document.getElementById('userInfo').textContent = `${currentUser.name} (${currentUser.role})`;
  buildTabs();
  switchTab(currentUser.role === 'freelancer' ? 'tabGigs' : 'tabJobs');
}

function buildTabs() {
  const tabs = document.getElementById('mainTabs');
  const defs = [
    { id: 'tabGigs',    label: '🔍 Browse Gigs',   roles: ['freelancer','client'] },
    { id: 'tabJobs',    label: '📋 Browse Jobs',    roles: ['freelancer','client'] },
    { id: 'tabPostGig', label: '➕ Post Gig',       roles: ['freelancer'] },
    { id: 'tabPostJob', label: '➕ Post Job',       roles: ['client'] },
    { id: 'tabMyBids',  label: '💼 My Bids',        roles: ['freelancer'] },
    { id: 'tabProfile', label: '👤 Profile',        roles: ['freelancer','client'] },
  ];
  tabs.innerHTML = '';
  defs.filter(d => d.roles.includes(currentUser.role)).forEach(d => {
    const btn = document.createElement('button');
    btn.textContent = d.label;
    btn.dataset.tab = d.id;
    btn.onclick = () => switchTab(d.id);
    tabs.appendChild(btn);
  });
}

function switchTab(id) {
  document.querySelectorAll('[id^="tab"]').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.remove('hidden');
  const btn = document.querySelector(`.tabs button[data-tab="${id}"]`);
  if (btn) btn.classList.add('active');
  if (id === 'tabGigs') loadGigs();
  if (id === 'tabJobs') loadJobs();
  if (id === 'tabMyBids') loadMyBids();
  if (id === 'tabProfile') loadProfile();
}

/* ── Gigs ───────────────────────────────────────────── */
async function loadGigs() {
  const cat = v('gigFilterCat'), max = v('gigFilterMax');
  let qs = '?status=active';
  if (cat) qs += `&category=${encodeURIComponent(cat)}`;
  if (max) qs += `&maxPrice=${max}`;
  const gigs = await api('GET', `/gigs${qs}`);
  const el = document.getElementById('gigList');
  if (!Array.isArray(gigs) || gigs.length === 0) {
    el.innerHTML = '<p style="color:#718096;font-size:.85rem">No gigs found.</p>'; return;
  }
  el.innerHTML = gigs.map(g => `
    <div class="list-card">
      <h3>${esc(g.title)}</h3>
      <div class="meta">${esc(g.category)} · ${g.deliveryDays}d delivery</div>
      <p style="font-size:.82rem;color:#4a5568">${esc(g.description).slice(0,100)}${g.description.length>100?'…':''}</p>
      <div class="price">$${g.priceUsd}</div>
      <span class="badge badge-green">${g.status}</span>
    </div>`).join('');
}

async function createGig() {
  const body = {
    title: v('gigTitle'), description: v('gigDesc'), category: v('gigCat'),
    priceUsd: Number(v('gigPrice')), deliveryDays: Number(v('gigDays'))
  };
  const res = await api('POST', '/gigs', body);
  if (res.error) return showMsg('appMsg', res.error, true);
  showMsg('appMsg', 'Gig created successfully!', false);
  ['gigTitle','gigDesc','gigPrice','gigDays'].forEach(id => { document.getElementById(id).value = ''; });
  switchTab('tabGigs');
}

/* ── Jobs ───────────────────────────────────────────── */
async function loadJobs() {
  const cat = v('jobFilterCat');
  let qs = '?status=open';
  if (cat) qs += `&category=${encodeURIComponent(cat)}`;
  const jobs = await api('GET', `/jobs${qs}`);
  const el = document.getElementById('jobList');
  if (!Array.isArray(jobs) || jobs.length === 0) {
    el.innerHTML = '<p style="color:#718096;font-size:.85rem">No open jobs found.</p>'; return;
  }
  el.innerHTML = jobs.map(j => `
    <div class="list-card">
      <h3>${esc(j.title)}</h3>
      <div class="meta">${esc(j.category)}</div>
      <p style="font-size:.82rem;color:#4a5568">${esc(j.description).slice(0,100)}${j.description.length>100?'…':''}</p>
      <div class="price">Budget: $${j.budgetUsd}</div>
      <span class="badge badge-blue">${j.status}</span>
      <div class="actions">
        ${currentUser.role === 'freelancer'
          ? `<button class="btn btn-primary btn-sm" data-jobid="${esc(j.id)}" data-jobtitle="${esc(j.title)}" onclick="openBidModalFromBtn(this)">Place Bid</button>`
          : ''}
      </div>
    </div>`).join('');
}

async function createJob() {
  const body = {
    title: v('jobTitle'), description: v('jobDesc'), category: v('jobCat'),
    budgetUsd: Number(v('jobBudget'))
  };
  const res = await api('POST', '/jobs', body);
  if (res.error) return showMsg('appMsg', res.error, true);
  showMsg('appMsg', 'Job posted successfully!', false);
  ['jobTitle','jobDesc','jobBudget'].forEach(id => { document.getElementById(id).value = ''; });
  switchTab('tabJobs');
}

/* ── Bids ───────────────────────────────────────────── */
function openBidModal(jobId, jobTitle) {
  bidTargetJobId = jobId;
  document.getElementById('bidJobTitle').value = jobTitle;
  document.getElementById('bidAmount').value = '';
  document.getElementById('bidMessage').value = '';
  clearMsg('bidModalMsg');
  document.getElementById('bidModal').classList.remove('hidden');
}
function openBidModalFromBtn(btn) {
  openBidModal(btn.dataset.jobid, btn.dataset.jobtitle);
}
function closeBidModal() { document.getElementById('bidModal').classList.add('hidden'); }

async function submitBid() {
  const body = { jobId: bidTargetJobId, amountUsd: Number(v('bidAmount')), message: v('bidMessage') };
  const res = await api('POST', '/bids', body);
  if (res.error) return showMsg('bidModalMsg', res.error, true);
  showMsg('bidModalMsg', 'Bid placed!', false);
  setTimeout(closeBidModal, 1200);
}

async function loadMyBids() {
  const res = await api('GET', `/bids/freelancer/${currentUser.id}`);
  const el = document.getElementById('myBidList');
  if (!Array.isArray(res) || res.length === 0) {
    el.innerHTML = '<p style="color:#718096;font-size:.85rem">No bids yet.</p>'; return;
  }
  el.innerHTML = res.map(b => `
    <div class="list-card">
      <div class="meta">Job ID: ${esc(b.jobId)}</div>
      <div class="price">$${b.amountUsd}</div>
      <p style="font-size:.82rem;color:#4a5568">${esc(b.message).slice(0,100)}</p>
      <span class="badge badge-yellow">${b.status}</span>
    </div>`).join('');
}

/* ── Profile ────────────────────────────────────────── */
async function loadProfile() {
  const res = await api('GET', `/users/${currentUser.id}`);
  const el = document.getElementById('profileInfo');
  if (res.error) { el.innerHTML = `<p class="alert alert-error">${res.error}</p>`; return; }
  el.innerHTML = `
    <div class="form-group"><label>Name</label><input value="${esc(res.name)}" readonly /></div>
    <div class="form-group"><label>Email</label><input value="${esc(res.email)}" readonly /></div>
    <div class="form-group"><label>Role</label><input value="${esc(res.role)}" readonly /></div>
    <div class="form-group"><label>Member since</label><input value="${new Date(res.createdAt).toLocaleDateString()}" readonly /></div>`;
}

/* ── Utilities ──────────────────────────────────────── */
async function api(method, path, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (token) opts.headers['Authorization'] = `Bearer ${token}`;
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    return await r.json();
  } catch (e) { return { error: e.message }; }
}

function v(id) { return document.getElementById(id)?.value ?? ''; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function clearMsg(id) { const el = document.getElementById(id); if (el) el.innerHTML = ''; }
function showMsg(id, msg, isError) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="alert ${isError ? 'alert-error' : 'alert-success'}">${esc(msg)}</div>`;
  if (!isError) setTimeout(() => { el.innerHTML = ''; }, 3000);
}

/* ── Init ───────────────────────────────────────────── */
if (token && currentUser) {
  initApp();
}
</script>
</body>
</html>
