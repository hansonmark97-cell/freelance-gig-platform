<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreelanceHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --primary-light: #eef2ff;
      --secondary: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f9fafb;
      --white: #ffffff;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* NAV */
    nav { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; height: 60px; display: flex; align-items: center; gap: 1rem; }
    .nav-logo { font-size: 1.25rem; font-weight: 700; color: var(--primary); cursor: pointer; text-decoration: none; flex-shrink: 0; }
    .nav-logo span { color: var(--secondary); }
    .nav-links { display: flex; gap: .25rem; flex: 1; }
    .nav-links button { background: none; border: none; padding: .5rem .75rem; border-radius: var(--radius); cursor: pointer; font-size: .9rem; color: var(--text-muted); font-weight: 500; transition: all .15s; }
    .nav-links button:hover, .nav-links button.active { background: var(--primary-light); color: var(--primary); }
    .nav-actions { display: flex; gap: .5rem; align-items: center; flex-shrink: 0; }
    .nav-user { font-size: .875rem; color: var(--text-muted); display: flex; align-items: center; gap: .5rem; }
    .nav-user strong { color: var(--text); }
    .badge { font-size: .7rem; font-weight: 600; padding: .15rem .5rem; border-radius: 999px; text-transform: uppercase; }
    .badge-freelancer { background: #dbeafe; color: #1d4ed8; }
    .badge-client { background: #dcfce7; color: #15803d; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.1rem; border-radius: var(--radius); font-size: .875rem; font-weight: 600; cursor: pointer; border: none; transition: all .15s; text-decoration: none; }
    .btn-primary { background: var(--primary); color: var(--white); }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--white); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg); }
    .btn-success { background: var(--secondary); color: var(--white); }
    .btn-success:hover { background: #059669; }
    .btn-danger { background: var(--danger); color: var(--white); }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .btn-ghost:hover { background: var(--primary-light); }
    .btn-sm { padding: .35rem .7rem; font-size: .8rem; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* MAIN */
    main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* HERO */
    .hero { background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); border-radius: 16px; padding: 4rem 2rem; text-align: center; color: white; margin-bottom: 3rem; }
    .hero h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; }
    .hero p { font-size: 1.1rem; opacity: .9; max-width: 500px; margin: 0 auto 2rem; }
    .hero-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .hero-actions .btn { padding: .75rem 1.5rem; font-size: 1rem; }
    .btn-white { background: white; color: var(--primary); }
    .btn-white:hover { background: #f3f4f6; }
    .btn-outline-white { background: transparent; color: white; border: 2px solid rgba(255,255,255,.6); }
    .btn-outline-white:hover { background: rgba(255,255,255,.1); }

    /* SECTION */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .section-header h2 { font-size: 1.5rem; font-weight: 700; }

    /* FILTERS */
    .filters { display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .filters select, .filters input { padding: .5rem .75rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: .875rem; background: var(--white); color: var(--text); outline: none; }
    .filters select:focus, .filters input:focus { border-color: var(--primary); }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }

    /* CARD */
    .card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem; box-shadow: var(--shadow); transition: box-shadow .15s, transform .15s; cursor: pointer; }
    .card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: .75rem; margin-bottom: .75rem; }
    .card h3 { font-size: 1rem; font-weight: 600; line-height: 1.4; flex: 1; }
    .card p { font-size: .875rem; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: .75rem; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem; }
    .price { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
    .price-budget { color: var(--secondary); }
    .cat-tag { background: var(--primary-light); color: var(--primary); font-size: .75rem; font-weight: 600; padding: .2rem .6rem; border-radius: 999px; white-space: nowrap; }
    .meta { font-size: .75rem; color: var(--text-muted); }

    /* DETAIL */
    .detail-page { display: grid; grid-template-columns: 1fr 340px; gap: 2rem; align-items: start; }
    @media (max-width: 768px) { .detail-page { grid-template-columns: 1fr; } }
    .detail-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.75rem; box-shadow: var(--shadow); }
    .detail-title { font-size: 1.75rem; font-weight: 700; margin-bottom: .75rem; line-height: 1.3; }
    .detail-meta { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; font-size: .875rem; color: var(--text-muted); }
    .detail-meta span { display: flex; align-items: center; gap: .3rem; }
    .detail-body { font-size: .95rem; line-height: 1.7; color: #374151; white-space: pre-wrap; margin-bottom: 1.5rem; }
    .detail-sidebar > * + * { margin-top: 1rem; }

    /* SIDEBAR CARD */
    .sidebar-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem; box-shadow: var(--shadow); }
    .sidebar-card h4 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .sidebar-price { font-size: 2rem; font-weight: 800; color: var(--primary); }
    .sidebar-meta { font-size: .85rem; color: var(--text-muted); margin-bottom: .25rem; }
    .sidebar-card .btn { width: 100%; justify-content: center; margin-top: .75rem; }

    /* FORM */
    .form-page { max-width: 640px; margin: 0 auto; }
    .form-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 2rem; box-shadow: var(--shadow); }
    .form-card h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: .875rem; font-weight: 600; margin-bottom: .4rem; color: var(--text); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: .6rem .85rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: .9rem; font-family: inherit; outline: none; transition: border .15s; background: var(--white); }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; }
    .form-error { color: var(--danger); font-size: .825rem; margin-top: .35rem; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal { background: var(--white); border-radius: 12px; padding: 2rem; width: 100%; max-width: 440px; box-shadow: var(--shadow-lg); }
    .modal h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
    .modal p { color: var(--text-muted); font-size: .875rem; margin-bottom: 1.5rem; }
    .modal-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; }
    .modal-tab { flex: 1; padding: .6rem; background: none; border: none; cursor: pointer; font-size: .9rem; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
    .modal-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .modal-close { float: right; background: none; border: none; font-size: 1.25rem; cursor: pointer; color: var(--text-muted); margin-top: -.5rem; }

    /* TABS */
    .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; gap: .25rem; }
    .tab { padding: .6rem 1rem; background: none; border: none; cursor: pointer; font-size: .9rem; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* BIDS LIST */
    .bid-item { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: .75rem; display: flex; align-items: flex-start; gap: 1rem; }
    .bid-body { flex: 1; }
    .bid-amount { font-size: 1.1rem; font-weight: 700; color: var(--primary); white-space: nowrap; }
    .bid-message { font-size: .875rem; color: var(--text-muted); margin-top: .3rem; line-height: 1.5; }
    .bid-meta { font-size: .75rem; color: var(--text-muted); margin-top: .3rem; }
    .bid-actions { display: flex; flex-direction: column; gap: .5rem; align-items: flex-end; flex-shrink: 0; }
    .status-badge { font-size: .75rem; font-weight: 600; padding: .2rem .6rem; border-radius: 999px; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-accepted { background: #d1fae5; color: #065f46; }
    .status-rejected { background: #fee2e2; color: #991b1b; }
    .status-open { background: #dbeafe; color: #1e40af; }
    .status-in_progress { background: #ede9fe; color: #5b21b6; }
    .status-completed { background: #d1fae5; color: #065f46; }
    .status-cancelled { background: #f3f4f6; color: #6b7280; }
    .status-active { background: #d1fae5; color: #065f46; }
    .status-deleted { background: #fee2e2; color: #991b1b; }

    /* REVIEWS */
    .review-item { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: .75rem; }
    .review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .stars { color: var(--warning); font-size: .95rem; letter-spacing: .05rem; }
    .review-comment { font-size: .875rem; color: var(--text-muted); line-height: 1.5; }

    /* ALERTS */
    .alert { padding: .85rem 1rem; border-radius: var(--radius); font-size: .875rem; margin-bottom: 1rem; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .alert-info { background: var(--primary-light); color: var(--primary-dark); border: 1px solid #c7d2fe; }

    /* EMPTY */
    .empty { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: .5rem; color: var(--text); }
    .empty p { font-size: .875rem; }

    /* LOADING */
    .loading { text-align: center; padding: 3rem; color: var(--text-muted); font-size: .9rem; }

    /* AVATAR */
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: white; font-weight: 700; font-size: .85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* DIVIDER */
    hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    /* RATING STARS */
    .star-input { display: flex; gap: .25rem; }
    .star-input span { font-size: 1.5rem; cursor: pointer; color: #d1d5db; transition: color .1s; }
    .star-input span.filled { color: var(--warning); }

    /* PROFILE */
    .profile-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--primary); color: white; font-weight: 800; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }
    .profile-info h2 { font-size: 1.5rem; font-weight: 700; }
    .profile-info p { color: var(--text-muted); font-size: .9rem; margin-top: .25rem; }

    /* HIDDEN */
    .hidden { display: none !important; }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      .hero h1 { font-size: 1.75rem; }
      .form-row { grid-template-columns: 1fr; }
      .bid-item { flex-direction: column; }
      .bid-actions { flex-direction: row; align-items: center; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a class="nav-logo" onclick="navigate('home')" href="#"><span>Freelance</span>Hub</a>
    <div class="nav-links">
      <button onclick="navigate('gigs')" data-view="gigs">Browse Gigs</button>
      <button onclick="navigate('jobs')" data-view="jobs">Browse Jobs</button>
    </div>
    <div class="nav-actions" id="nav-actions">
      <button class="btn btn-secondary btn-sm" onclick="openAuth('login')">Log In</button>
      <button class="btn btn-primary btn-sm" onclick="openAuth('register')">Sign Up</button>
    </div>
  </div>
</nav>

<!-- AUTH MODAL -->
<div class="modal-overlay hidden" id="auth-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tab-login" onclick="switchAuthTab('login')">Log In</button>
      <button class="modal-tab" id="tab-register" onclick="switchAuthTab('register')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Password" required />
      </div>
      <div id="login-error" class="alert alert-error hidden"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="login-btn">Log In</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" class="hidden" onsubmit="doRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Jane Smith" required />
        </div>
        <div class="form-group">
          <label>I am a</label>
          <select id="reg-role">
            <option value="freelancer">Freelancer</option>
            <option value="client">Client</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" minlength="6" required />
      </div>
      <div id="register-error" class="alert alert-error hidden"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="register-btn">Create Account</button>
    </form>
  </div>
</div>

<!-- MAIN CONTENT -->
<main id="app"></main>

<script>
/* ===== STATE ===== */
let state = {
  view: 'home',
  params: {},
  user: null,
  token: null,
};

/* ===== INIT ===== */
(function init() {
  const saved = localStorage.getItem('flh_token');
  const savedUser = localStorage.getItem('flh_user');
  if (saved && savedUser) {
    state.token = saved;
    state.user = JSON.parse(savedUser);
  }
  renderNav();
  navigate('home');
})();

/* ===== NAV ===== */
function renderNav() {
  const el = document.getElementById('nav-actions');
  if (state.user) {
    el.innerHTML = `
      <div class="nav-user">
        <strong>${esc(state.user.name)}</strong>
        <span class="badge badge-${state.user.role}">${state.user.role}</span>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="navigate('dashboard')">Dashboard</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Logout</button>
    `;
  } else {
    el.innerHTML = `
      <button class="btn btn-secondary btn-sm" onclick="openAuth('login')">Log In</button>
      <button class="btn btn-primary btn-sm" onclick="openAuth('register')">Sign Up</button>
    `;
  }
  // Highlight active nav link
  document.querySelectorAll('.nav-links button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === state.view);
  });
}

/* ===== ROUTING ===== */
function navigate(view, params = {}) {
  state.view = view;
  state.params = params;
  renderNav();
  render();
}

function render() {
  const app = document.getElementById('app');
  switch (state.view) {
    case 'home':      renderHome(app); break;
    case 'gigs':      renderGigList(app); break;
    case 'jobs':      renderJobList(app); break;
    case 'gig':       renderGigDetail(app); break;
    case 'job':       renderJobDetail(app); break;
    case 'create-gig': renderCreateGig(app); break;
    case 'post-job':  renderPostJob(app); break;
    case 'dashboard': renderDashboard(app); break;
    case 'profile':   renderProfile(app); break;
    default:          renderHome(app);
  }
}

/* ===== API ===== */
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (state.token) opts.headers['Authorization'] = 'Bearer ' + state.token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  const data = await res.json().catch(() => null);
  if (!res.ok) throw new Error((data && data.error) || `HTTP ${res.status}`);
  return data;
}

/* ===== AUTH ===== */
function openAuth(tab) {
  document.getElementById('auth-modal').classList.remove('hidden');
  switchAuthTab(tab);
}
function closeAuth() {
  document.getElementById('auth-modal').classList.add('hidden');
}
function switchAuthTab(tab) {
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true; btn.textContent = 'Logging in…';
  errEl.classList.add('hidden');
  try {
    const data = await api('POST', '/users/login', {
      email: document.getElementById('login-email').value,
      password: document.getElementById('login-password').value,
    });
    saveSession(data);
    closeAuth();
    navigate('dashboard');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.textContent = 'Log In';
  }
}
async function doRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('register-btn');
  const errEl = document.getElementById('register-error');
  btn.disabled = true; btn.textContent = 'Creating account…';
  errEl.classList.add('hidden');
  try {
    const data = await api('POST', '/users/register', {
      name: document.getElementById('reg-name').value,
      email: document.getElementById('reg-email').value,
      password: document.getElementById('reg-password').value,
      role: document.getElementById('reg-role').value,
    });
    saveSession(data);
    closeAuth();
    navigate('dashboard');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}
function saveSession(data) {
  state.token = data.token;
  state.user = data.user;
  localStorage.setItem('flh_token', data.token);
  localStorage.setItem('flh_user', JSON.stringify(data.user));
  renderNav();
}
function doLogout() {
  state.token = null; state.user = null;
  localStorage.removeItem('flh_token');
  localStorage.removeItem('flh_user');
  renderNav();
  navigate('home');
}

/* ===== HOME ===== */
function renderHome(app) {
  app.innerHTML = `
    <div class="hero">
      <h1>Find Work. Get Work Done.</h1>
      <p>Connect with talented freelancers or post a job to find the perfect professional for any project.</p>
      <div class="hero-actions">
        <button class="btn btn-white" onclick="navigate('gigs')">Browse Gigs</button>
        <button class="btn btn-outline-white" onclick="navigate('jobs')">Browse Jobs</button>
        ${!state.user ? `<button class="btn btn-white" onclick="openAuth('register')">Get Started Free</button>` : ''}
      </div>
    </div>
    <div id="home-content">
      <div class="loading">Loading featured gigs…</div>
    </div>
  `;
  loadHomeContent();
}

async function loadHomeContent() {
  try {
    const [gigs, jobs] = await Promise.all([
      api('GET', '/gigs?status=active'),
      api('GET', '/jobs?status=open'),
    ]);
    const el = document.getElementById('home-content');

function orderModal() {
  return `

        <p style="font-size:.85rem;color:var(--text-muted);margin-top:.5rem">A payment intent will be created. (9% platform fee applies)</p>
        <div id="order-result" class="hidden" style="margin-top:1rem"></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:1rem" onclick="doOrder()">Confirm Order</button>
      </div>
    </div>
  `;
}

function showOrderModal(gigId, title, price) {
  const modal = document.getElementById('order-modal');
  modal.classList.remove('hidden');
  modal.addEventListener('click', function handler(e) {
    if (e.target === modal) {
      modal.classList.add('hidden');
      modal.removeEventListener('click', handler);
    }
  });
  document.getElementById('order-gig-name').textContent = title;
  document.getElementById('order-price').textContent = `$${price}`;
  document.getElementById('order-modal').dataset.amount = price;
}

async function doOrder() {
  const modal = document.getElementById('order-modal');
  const resultEl = document.getElementById('order-result');
  const amount = parseFloat(modal.dataset.amount);
  resultEl.className = 'hidden';
  try {
    const data = await api('POST', '/payments/intent', { amountUsd: amount });
    resultEl.innerHTML = `
      <div class="alert alert-success">
        ✅ Payment intent created!<br/>
        <small>Platform fee: $${data.platformFeeUsd} | Freelancer payout: $${data.freelancerPayoutUsd}</small>
      </div>
    `;
    resultEl.classList.remove('hidden');
  } catch (err) {
    resultEl.innerHTML = `<div class="alert alert-error">${esc(err.message)}</div>`;
    resultEl.classList.remove('hidden');
  }
}

async function loadBids(jobId, isOwner) {
  const el = document.getElementById('bids-section');
  if (!el) return;
  try {
    const bids = await api('GET', `/bids/job/${jobId}`);
    el.innerHTML = `
      <div class="detail-card">
        <h3 style="margin-bottom:1rem">Bids (${bids.length})</h3>
        ${bids.length ? bids.map(b => renderBidItem(b, isOwner)).join('') : '<p style="color:var(--text-muted);font-size:.875rem">No bids yet.</p>'}
      </div>
    `;
  } catch {
    el.innerHTML = '<div class="alert alert-error">Could not load bids.</div>';
  }
}

function renderBidItem(bid, isOwner) {
  return `
    <div class="bid-item">
      <div class="bid-body">
        <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
          <span class="bid-amount">$${bid.amountUsd}</span>
          <span class="status-badge status-${bid.status}">${bid.status}</span>
        </div>
        <div class="bid-message">${esc(bid.message)}</div>
        <div class="bid-meta">${formatDate(bid.createdAt)}</div>
      </div>
      ${isOwner && bid.status === 'pending' ? `
        <div class="bid-actions">
          <button class="btn btn-success btn-sm" onclick="acceptBid('${bid.id}','${bid.jobId}')">Accept</button>
          <button class="btn btn-secondary btn-sm" onclick="rejectBid('${bid.id}','${bid.jobId}')">Reject</button>
        </div>
      ` : ''}
    </div>
  `;
}

async function submitBid(e, jobId) {
  e.preventDefault();
  const btn = document.getElementById('bid-btn');
  const errEl = document.getElementById('bid-error');
  btn.disabled = true; btn.textContent = 'Submitting…';
  errEl.classList.add('hidden');
  try {
    await api('POST', '/bids', {
      jobId,
      amountUsd: parseFloat(document.getElementById('bid-amount').value),
      message: document.getElementById('bid-message').value,
    });
    document.getElementById('bid-amount').value = '';
    document.getElementById('bid-message').value = '';
    loadBids(jobId, false);
    showToast('Bid submitted!');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.textContent = 'Submit Bid';
  }
}

async function acceptBid(bidId, jobId) {
  if (!confirm('Accept this bid? All other bids will be rejected.')) return;
  try {
    await api('PUT', `/bids/${bidId}/accept`);
    loadBids(jobId, true);
    showToast('Bid accepted!');
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

async function rejectBid(bidId, jobId) {
  try {
    await api('PUT', `/bids/${bidId}/reject`);
    loadBids(jobId, true);
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

  }
}

function renderClientDashboard() {
  return `
    <div id="dash-my-jobs"><div class="loading">Loading your jobs…</div></div>
  `;
}

function switchDashTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`)?.classList.add('active');
  ['my-gigs', 'my-bids'].forEach(id => {
    document.getElementById(`dash-${id}`)?.classList.toggle('hidden', id !== tab);
  });
}

async function loadMyGigs() {
  const el = document.getElementById('dash-my-gigs');
  if (!el) return;
  try {
    // Fetch all active gigs and filter by owner
    const gigs = await api('GET', '/gigs?status=active');
    const mine = gigs.filter(g => g.freelancerId === state.user.id);
    // Also fetch deleted ones by looking at the user's profile
    if (!mine.length) {
      el.innerHTML = `
        ${emptyState('📦', 'No gigs yet', 'Create your first gig to start earning.')}
        <div style="text-align:center;margin-top:1rem">
          <button class="btn btn-primary" onclick="navigate('create-gig')">Create Your First Gig</button>
        </div>
      `;
    } else {
      el.innerHTML = `<div class="grid">${renderMyGigCards(mine)}</div>`;
    }
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${esc(err.message)}</div>`;
  }
}

function renderMyGigCards(gigs) {
  return gigs.map(g => `
    <div class="card" onclick="navigate('gig',{id:'${g.id}'})">
      <div class="card-header">
        <h3>${esc(g.title)}</h3>
        <span class="status-badge status-${g.status}">${g.status}</span>
      </div>
      <p>${esc(g.description)}</p>
      <div class="card-footer">
        <span class="price">$${g.priceUsd}</span>
        <span class="cat-tag">${esc(g.category)}</span>
        <span class="meta">⏱ ${g.deliveryDays}d</span>
      </div>
    </div>
  `).join('');
}

async function loadMyBids() {
  const el = document.getElementById('dash-my-bids');
  if (!el) return;
  try {
    const bids = await api('GET', '/bids/my');
    if (!bids.length) {
      el.innerHTML = emptyState('📝', 'No bids yet', 'Browse open jobs and place your first bid.');
      return;
    }
    el.innerHTML = bids.map(b => `
      <div class="bid-item" onclick="navigate('job',{id:'${b.jobId}'})" style="cursor:pointer">
        <div class="bid-body">
          <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
            <span class="bid-amount">$${b.amountUsd}</span>
            <span class="status-badge status-${b.status}">${b.status}</span>
          </div>
          <div class="bid-message">${esc(b.message)}</div>
          <div class="bid-meta">Job ID: ${b.jobId} · ${formatDate(b.createdAt)}</div>
        </div>
      </div>
    `).join('');
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${esc(err.message)}</div>`;
  }
}

async function loadMyJobs() {
  const el = document.getElementById('dash-my-jobs');
  if (!el) return;
  try {
    const [open, inProg] = await Promise.all([
      api('GET', '/jobs?status=open'),
      api('GET', '/jobs?status=in_progress'),
    ]);
    const allJobs = [...open, ...inProg].filter(j => j.clientId === state.user.id);
    if (!allJobs.length) {
      el.innerHTML = `
        ${emptyState('💼', 'No jobs posted yet', 'Post a job to find talented freelancers.')}
        <div style="text-align:center;margin-top:1rem">
          <button class="btn btn-primary" onclick="navigate('post-job')">Post Your First Job</button>
        </div>
      `;
      return;
    }
    el.innerHTML = `
      <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:1rem">My Jobs</h3>
      <div class="grid">${allJobs.map(j => `
        <div class="card" onclick="navigate('job',{id:'${j.id}'})">
          <div class="card-header">
            <h3>${esc(j.title)}</h3>
            <span class="status-badge status-${j.status}">${j.status}</span>
          </div>
          <p>${esc(j.description)}</p>
          <div class="card-footer">
            <span class="price price-budget">$${j.budgetUsd}</span>
            <span class="cat-tag">${esc(j.category)}</span>
          </div>
        </div>
      `).join('')}</div>
    `;
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${esc(err.message)}</div>`;
  }
}

/* ===== PROFILE ===== */
async function renderProfile(app) {
  const userId = state.params.id;
  app.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const reviews = await api('GET', `/reviews/user/${userId}`);
    const avgRating = reviews.length
      ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1)
      : null;
    app.innerHTML = `
      <div class="detail-card" style="margin-bottom:1.5rem">
        <div class="profile-header">
          <div class="profile-avatar">${userId[0].toUpperCase()}</div>
          <div class="profile-info">
            <h2>User Profile</h2>
            ${avgRating ? `<p>⭐ ${avgRating} avg rating (${reviews.length} reviews)</p>` : '<p>No reviews yet</p>'}
          </div>
        </div>
      </div>
      <div class="detail-card">
        <h3 style="margin-bottom:1rem">Reviews (${reviews.length})</h3>
        ${reviews.length ? reviews.map(renderReview).join('') : '<p style="color:var(--text-muted);font-size:.875rem">No reviews yet.</p>'}
      </div>
    `;
  } catch (err) {
    app.innerHTML = `<div class="alert alert-error">${esc(err.message)}</div>`;
  }
}

/* ===== REVIEWS ===== */
function renderReviewFormInline(type, refId, revieweeId) {
  const formId = `review-form-${refId}`;
  return `
    <form id="${formId}" onsubmit="submitReview(event,'${formId}','${revieweeId}','${type}','${refId}')">
      <div class="form-group">
        <label style="font-size:.8rem">Rating</label>
        <div class="star-input" id="stars-${refId}">
          ${[1,2,3,4,5].map(i => `<span data-val="${i}" onclick="setStars('${refId}',${i})">☆</span>`).join('')}
        </div>
        <input type="hidden" id="rating-val-${refId}" value="0" />
      </div>
      <div class="form-group">
        <textarea placeholder="Write your review…" id="review-comment-${refId}" style="min-height:70px;font-size:.85rem" required></textarea>
      </div>
      <div id="review-err-${refId}" class="alert alert-error hidden"></div>
      <button type="submit" class="btn btn-secondary btn-sm" style="width:100%;justify-content:center">Submit Review</button>
    </form>
  `;
}

function setStars(refId, val) {
  document.getElementById(`rating-val-${refId}`).value = val;
  document.querySelectorAll(`#stars-${refId} span`).forEach(s => {
    s.textContent = parseInt(s.dataset.val) <= val ? '★' : '☆';
    s.classList.toggle('filled', parseInt(s.dataset.val) <= val);
  });
}

async function submitReview(e, formId, revieweeId, type, refId) {
  e.preventDefault();
  const rating = parseInt(document.getElementById(`rating-val-${refId}`).value);
  const comment = document.getElementById(`review-comment-${refId}`).value;
  const errEl = document.getElementById(`review-err-${refId}`);
  errEl.classList.add('hidden');
  if (!rating) { errEl.textContent = 'Please select a rating.'; errEl.classList.remove('hidden'); return; }
  try {
    const body = { revieweeId, rating, comment };
    if (type === 'gig') body.gigId = refId;
    if (type === 'job') body.jobId = refId;
    await api('POST', '/reviews', body);
    document.getElementById(formId).innerHTML = '<div class="alert alert-success">Review submitted! ✅</div>';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
}

function renderReview(r) {
  const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
  return `
    <div class="review-item">
      <div class="review-header">
        <span class="stars">${stars}</span>
        <span class="meta">${formatDate(r.createdAt)}</span>
      </div>
      <div class="review-comment">${esc(r.comment)}</div>
    </div>
  `;
}

/* ===== HELPERS ===== */
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function emptyState(icon, title, msg) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><h3>${title}</h3><p>${msg}</p></div>`;
}

function categoryOptions() {
  const cats = ['Design', 'Development', 'Writing', 'Marketing', 'Video', 'Music', 'Business', 'Data', 'Other'];
  return cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;background:#1f2937;color:white;padding:.75rem 1.25rem;border-radius:8px;font-size:.875rem;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:fadeIn .2s ease';
  t.textContent = '✓ ' + msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
